name: Bug report
description: Report something that is not working as expected.
title: '[Bug]: '
labels:
  - bug
  - needs triage
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: input
    id: repro-link
    attributes:
      label: Reproduction link
      description: A link to a minimal reproduction repository, a failing PHPUnit test, or a code snippet.
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: Reproduction steps
      description: Steps to reproduce the issue using the reproduction above. Include what was expected to happen.
  - type: dropdown
    id: php-version
    attributes:
      label: PHP version
      description: Select the PHP version or versions in use.
      multiple: true
      options:
        - '8.2'
        - '8.3'
        - '8.4'
        - 'Other'
  - type: input
    id: symfony-version
    attributes:
      label: Symfony version
      description: 'The Symfony version in use.'
      placeholder: e.g. 6.4, 7.4, 8.x
  - type: textarea
    id: system
    attributes:
      label: System
      description: Paste the output of `composer show` for the relevant packages, or list the PHP and Symfony versions.
      render: bash
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
